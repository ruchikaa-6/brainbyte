<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: #f4f7fb;
      display: flex;
      flex-direction: column;
    }
    .navbar-custom {
      background: linear-gradient(45deg, #6A0DAD, #764ba2);
    }
    .navbar-brand {
      font-weight: 600;
      color: #fff !important;
    }
    .navbar-nav .nav-link {
      color: #fff !important;
      font-weight: 500;
      margin-left: 15px;
    }
    .navbar-nav .nav-link:hover {
      text-decoration: underline;
    }
    .login-wrapper {
      background: #fff;
      border-radius: 1rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      overflow: hidden;
      max-width: 900px;
      width: 100%;
      margin: auto; /* keeps it centered */
    }
    .login-left {
      background: #6A0DAD;
      color: #fff;
      padding: 3rem 2rem;
      text-align: center;
    }
    .login-left h2 {
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .login-left p {
      font-size: 0.95rem;
      opacity: 0.9;
    }
    .login-left img {
      max-width: 80%;
      margin-bottom: 1.5rem;
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0); }
    }
    .login-right {
      padding: 3rem 2rem;
    }
    .login-right h3 {
      font-weight: 600;
      margin-bottom: 2rem;
      color: #333;
    }
    .form-control {
      border-radius: 0.75rem;
      padding: 0.75rem;
    }
    .btn-login {
      background: linear-gradient(45deg, #667eea, #764ba2);
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem;
      font-weight: 600;
      color: #fff;
      transition: all 0.3s;
    }
    .btn-login:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    }
    .text-link a {
      color: #764ba2;
      text-decoration: none;
      font-weight: 500;
    }
    .text-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
      <img src="{{ url_for('static', filename='images/BrainByte.png') }}" alt="BrainByte Logo" width="150">
      <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/register">Register</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Login Box -->
  <div class="login-wrapper row g-0 w-100 mt-5">
    <div class="col-md-6 login-left d-flex flex-column justify-content-center align-items-center">
      <img src="https://img.icons8.com/clouds/500/student-male.png" alt="illustration">
      <h2>Learn. Test. Achieve.</h2>
      <p>Sign in to access your courses.</p>
    </div>
    <div class="col-md-6 login-right">
      <h3>Welcome to BrainByte!</h3>
      <p class="text-muted">We are happy to have you back.</p>
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" placeholder="Enter username" name="username" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" placeholder="Enter password" name="password" required>
        </div>
        <!--<div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <input type="checkbox" id="remember"> <label for="remember" class="ms-1">Remember me</label>
          </div>
          <a href="#" class="text-link">Forgot Password?</a>
        </div>-->
        <button type="submit" class="btn btn-login w-100">Login</button>
        <div class="text-center text-link mt-3">
          <p>Don’t have an account? <a href="/register">Register</a></p>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
