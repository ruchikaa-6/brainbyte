<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upload Material</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body{background:#f5f7fb;font-family:'Segoe UI',sans-serif}
    .card-soft{border:none;border-radius:14px;box-shadow:0 6px 16px rgba(0,0,0,.06)}
    .btn-grad{background:linear-gradient(90deg,#007bff,#6a0dad);border:none;color:#fff;border-radius:10px}
    .btn-grad:hover{opacity:.95}
  </style>
</head>
<body>
  <div class="container my-5">
    <div class="card-soft p-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold mb-0">Add New Material</h4>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary btn-sm">Back</a>
      </div>

<form method="post" enctype="multipart/form-data" action="{{ url_for('upload_material', course_id=course['course_id']) }}">
        <div class="row g-3">
          <div class="col-md-8">
            <label class="form-label fw-semibold">Material title</label>
            <input type="text" name="m_title" class="form-control" placeholder="eg. React Basics" required>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Choose file</label>
            <input type="file" name="file" class="form-control" required>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Description (optional)</label>
            <textarea class="form-control" rows="3" placeholder="Short description…"></textarea>
          </div>
        </div>

        <div class="mt-3 d-flex gap-2">
          <button class="btn btn-grad">Save Material</button>
          <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
