<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title> Quizzes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --purple:#6a0dad; --blue:#007bff; }
    body{ background:#f6f7fb; font-family:'Segoe UI',sans-serif; }
    .navbar{ background:#fff; box-shadow:0 2px 10px rgba(0,0,0,.05); }
    .header{ background:#fff;border-radius:14px;box-shadow:0 8px 22px rgba(0,0,0,.06);}
    .stat-pill{ background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(0,0,0,.06); }
    .tabcard{ background:#fff;border-radius:14px;box-shadow:0 10px 24px rgba(0,0,0,.08); }
    .btn-gradient{ background:linear-gradient(90deg,var(--blue),var(--purple));color:#fff;border:none;border-radius:10px;font-weight:600; }
    .btn-gradient:hover{ opacity:.95; }
    .msg{ color:#198754; font-weight:600; }
  </style>
</head>
<body>
<nav class="navbar py-3">
  <div class="container-fluid px-4">
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-link text-decoration-none">&larr;</a>
    <div class="ms-2 fw-bold">LMS Admin</div>
    <div class="ms-auto"><a href="{{ url_for('logout') }}" class="btn btn-danger btn-sm">Logout</a></div>
  </div>
</nav>

<div class="container px-4 py-4">
  <div class="header p-4 mb-3">
    <h3 class="fw-bold mb-1">{{ course['title'] }}</h3>
    <div class="text-muted mb-3">{{ course['description'] }}</div>
    <div class="row g-3">
      <div class="col-12 col-md-4"><div class="stat-pill p-3 text-center">
        <div class="h4 text-primary">{{ counts['materials'] }}</div><div class="small text-muted">Learning Materials</div>
      </div></div>
      <div class="col-12 col-md-4"><div class="stat-pill p-3 text-center">
        <div class="h4" style="color:var(--purple)">{{ counts['quizzes'] }}</div><div class="small text-muted">Quiz Assessments</div>
      </div></div>
    </div>
  </div>

  <!-- Tabs + Add Quiz -->
  <div class="tabcard p-3">
    <ul class="nav nav-tabs border-0">
      <li class="nav-item">
        <a class="nav-link" href="{{ url_for('upload_material', course_id=course['course_id']) }}">Materials</a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" href="#">Quizzes</a>
      </li>
      <li class="ms-auto">
        <a class="btn btn-primary">+ Add Quiz</a>
      </li>
    </ul>

    <div class="p-3">
      {% if msg %}<div class="msg mb-2">{{ msg }}</div>{% endif %}
      <form method="post" action="{{ url_for('add_question', course_id=course['course_id']) }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Question</label>
          <textarea name="question" class="form-control" rows="3" required></textarea>
        </div>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Option 1</label>
            <input name="option1" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Option 2</label>
            <input name="option2" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Option 3</label>
            <input name="option3" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Option 4</label>
            <input name="option4" class="form-control" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Correct Option (1–4)</label>
            <input type="number" name="correct_option" min="1" max="4" class="form-control" required>
          </div>
        </div>
        <div class="mt-3">
          <button class="btn btn-gradient">Save Quiz</button>
          <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </div>
      </form>
    </div>

    <hr>
    <div class="mt-2">
      <div class="small text-muted mb-2">Quiz Assessments</div>
      <div class="text-muted">Newly added quizzes will appear here.</div>
    </div>
  </div>
</div>
</body>
</html>
